add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
style = 'fg:245'
symbol = '-'

[character]
error_symbol = "[пҖҚ пҒӢ](bold fg:244)"
success_symbol = "[о©ұ пҒӢ](bold fg:243)"

[package]
disabled = true

[git_branch]
format = " у°ңҘ [оӮ¶](bold fg:252)[$symbol $branch(:$remote_branch)](fg:235 bg:252)[оӮҙ ](bold fg:252)"
style = "bg:252"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
cherry_pick = "[рҹҚ’ PICKING](bold red)"
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
conflicted = " рҹҸі "
deleted = " рҹ—‘ "
diverged = " пҝҪ "
modified = " рҹ“қ "
renamed = " вңҚпёҸ "
staged = '[++\($count\)](green)'
stashed = " рҹ“Ұ "
untracked = " рҹӨ· вҖҚ"

[hostname]
disabled = false
format = "[вҖў$hostname](bg:252 bold fg:235)[оӮҙ](bold fg:252)"
ssh_only = false
trim_at = ".companyname.com"

[line_break]
disabled = false

[memory_usage]
disabled = true
style = "bold dimmed green"
symbol = " "
threshold = -1

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
disabled = false
format = "[оӮ¶](bold fg:252)[$user]($style)"
show_always = true
style_root = "red bold"
style_user = "bold bg:252 fg:235"

[directory]
format = '[оӮ¶](bold fg:255)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:255)'
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:255 fg:240"
truncation_length = 2
truncation_symbol = ".../"

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"GitHub" = " у°ҠӨ "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "

[cmd_duration]
format = '[оӮ¶](bold fg:252)[у°Әў $duration](bold bg:252 fg:235)[оӮҙ](bold fg:252)'
min_time = 0
