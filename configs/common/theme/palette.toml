# Single source of truth for terminal colors (Kitty + Fish + Starship palette).
# Edit this file, then run from repo root:
#   python scripts/render_theme.py
# It regenerates:
#   - configs/common/kitty/colors.generated.conf
#   - configs/common/fish/config.d/05-theme-palette.fish
#   - [palettes.nordic] inside configs/common/starship/starship.toml (between markers)

[meta]
name = "catppuccin-macchiato-kitty"
description = "Catppuccin Macchiato for Kitty + matching Starship palette (nordic slot)"

# ── Kitty — Catppuccin Macchiato (https://github.com/catppuccin/kitty) ───────
[kitty]
foreground = "#cad3f5"
background = "#24273a"
selection_foreground = "#24273a"
selection_background = "#f4dbd6"

cursor = "#f4dbd6"
cursor_text_color = "#24273a"

scrollbar_handle_color = "#939ab7"
scrollbar_track_color = "#494d64"

url_color = "#f4dbd6"

active_border_color = "#b7bdf8"
inactive_border_color = "#6e738d"
bell_border_color = "#eed49f"

wayland_titlebar_color = "system"
macos_titlebar_color = "system"

active_tab_foreground = "#181926"
active_tab_background = "#c6a0f6"
inactive_tab_foreground = "#cad3f5"
inactive_tab_background = "#1e2030"
tab_bar_background = "#181926"

mark1_foreground = "#24273a"
mark1_background = "#b7bdf8"
mark2_foreground = "#24273a"
mark2_background = "#c6a0f6"
mark3_foreground = "#24273a"
mark3_background = "#7dc4e4"

color0 = "#494d64"
