# Single source of truth for terminal colors (Kitty + Fish + Starship palette).
# Edit this file, then run from repo root:
#   python scripts/render_theme.py
# It regenerates:
#   - configs/common/kitty/colors.generated.conf
#   - configs/common/fish/config.d/05-theme-palette.fish
#   - [palettes.onedark] inside configs/common/starship/starship.toml (between markers)

[meta]
name = "one-dark-kitty"
description = "One Dark–style Kitty ANSI + Starship/Fish palette (single source)"

# ── Kitty (your base colors + matching UI chrome) ───────────────────────────
[kitty]
background = "#1e2127"
foreground = "#cdd4e1"

cursor = "#51afef"
cursor_text_color = "#1e2127"
cursor_trail_color = "#61afef"

selection_background = "#3e4451"
selection_foreground = "#abb2bf"

url_color = "#61afef"

active_border_color = "#61afef"
inactive_border_color = "#c678dd"
bell_border_color = "#e06c75"

wayland_titlebar_color = "system"
macos_titlebar_color = "system"

active_tab_foreground = "#1e2127"
active_tab_background = "#61afef"
inactive_tab_foreground = "#61afef"
inactive_tab_background = "#282c34"
tab_bar_background = "#1e2127"
tab_bar_margin_color = "#1e2127"

scrollbar_handle_color = "#5c6370"
