# Colors: single source configs/common/theme/palette.toml → python scripts/render_theme.py
include colors.generated.conf
# Legacy full theme (superseded by palette.toml + colors.generated.conf); kept for reference.
# include theme.conf

# Font
font_family JetBrains Mono Nerd Font
font_size 11.0

# Cursor
cursor_shape beam
cursor_trail 1
cursor_blink_interval 0

# Window spacing
window_margin_width 21.75

# Shell
shell fish
shell_integration enabled

# Quality of life
confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0.0
scrollback_lines 10000
strip_trailing_spaces smart

# copy
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+с copy_to_clipboard

# paste
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+м paste_from_clipboard

# Search
map ctrl+f launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll
map page_up scroll_page_up
map page_down scroll_page_down

# Zoom
map ctrl+plus change_font_size all +1
map ctrl+equal change_font_size all +1
map ctrl+kp_add change_font_size all +1
map ctrl+minus change_font_size all -1
map ctrl+underscore change_font_size all -1
map ctrl+kp_subtract change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# BEGIN_KITTY_THEME
# Noctalia / third-party themes: disabled so colors.generated.conf (palette.toml) is the single source.
# include current-theme.conf
# END_KITTY_THEME
