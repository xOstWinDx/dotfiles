"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "nordic"

# Minimal, no filled segments: icons + palette fg only. SSH vs local differs via $hostname / $localip (ssh_only).
format = """
[╭─](bold gray4)\
$sudo\
$username\
$hostname\
$localip\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$cmd_duration\
$jobs\
$line_break\
[╰─](bold gray4)\
$character"""

[fill]
symbol = " "

[package]
disabled = true

[direnv]
disabled = true

[nix_shell]
disabled = true

# ── prompt character ───────────────────────────────────────────────────────
[character]
success_symbol = "[](bold green_bright)"
error_symbol = "[](bold red_bright)"

# ── identity & SSH (hostname + IP only on SSH) ─────────────────────────────
[username]
disabled = false
show_always = true
style_root = "bold red_bright"
style_user = "bold white0_reduce_blue"
format = "[ $user]($style) "

[hostname]
disabled = false
ssh_only = true
ssh_symbol = "󰌘 "
trim_at = ".local"
format = "[$ssh_symbol$hostname](bold red_bright) "

[localip]
disabled = false
ssh_only = true
format = "[󰩠 $localipv4](bold yellow_dim) "

# ── path ───────────────────────────────────────────────────────────────────
[directory]
read_only = " "
style = "bold cyan_bright dimmed"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~ "
format = "[$read_only]($read_only_style)[󰉋 $path]($style) "

[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"GitHub" = " 󰊤 "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "

# ── git (compact glyphs) ───────────────────────────────────────────────────
[git_branch]
symbol = "󰘬 "
format = "[$symbol$branch(:$remote_branch)](bold magenta_bright dimmed) "
truncation_length = 20
truncation_symbol = "…"

[git_state]
format = '[\($state( $progress_current/$progress_total)\)](bold red_bright) '
cherry_pick = "[󰏫 cherry](bold red_bright)"

[git_status]
style = "bold magenta_bright dimmed"
ahead = " 󰞙 "
behind = " 󰞀 "
conflicted = " 󰞇 "
deleted = " 󰆴 "
diverged = " 󰓒 "
modified = " 󰏫 "
renamed = " 󰏠 "
staged = " 󰄬 "
stashed = " 󰏌 "
untracked = " 󰋗 "

[git_commit]
disabled = true

# ── python / venv ──────────────────────────────────────────────────────────
[python]
symbol = " "
pyenv_version_name = true
detect_extensions = ["py", "ipynb"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", "tox.ini", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]
# Single-quoted: Starship needs `\(` for literal parens around `$virtualenv`; in TOML `"..."` that `\` breaks parsing.
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )](bold green_bright) '

# ── timing & privilege hints ───────────────────────────────────────────────
[cmd_duration]
min_time = 500
show_milliseconds = false
format = "[ $duration](bold yellow_bright) "

[sudo]
disabled = false
format = "[](bold red_bright) "

[status]
disabled = true

[jobs]
disabled = false
symbol = "󰜺 "
format = "[$symbol$number](bold yellow_base) "
threshold = 1

[line_break]
disabled = false

# ── unused modules (explicit off = faster) ────────────────────────────────
[memory_usage]
disabled = true

[time]
disabled = true

[container]
disabled = true

[os]
disabled = true

