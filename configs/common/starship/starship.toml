"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
palette = "nordic"

# Minimal, no filled segments: icons + palette fg only. SSH vs local differs via $hostname / $localip (ssh_only).
format = """
[в•ӯв”Җ](bold gray4)\
$sudo\
$username\
$hostname\
$localip\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$cmd_duration\
$jobs\
$line_break\
[в•°в”Җ](bold gray4)\
$character"""

[fill]
symbol = " "

[package]
disabled = true

[direnv]
disabled = true

[nix_shell]
disabled = true

# в”Җв”Җ prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[п„Ғ](bold green_bright)"
error_symbol = "[п„Ғ](bold red_bright)"

# в”Җв”Җ identity & SSH (hostname + IP only on SSH) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
disabled = false
show_always = true
style_root = "bold red_bright"
style_user = "bold white0_reduce_blue"
format = "[пҖҮ $user]($style) "

[hostname]
disabled = false
ssh_only = true
ssh_symbol = "у°Ңҳ "
trim_at = ".local"
format = "[$ssh_symbol$hostname](bold red_bright) "

[localip]
disabled = false
ssh_only = true
format = "[у°©  $localipv4](bold yellow_dim) "

# в”Җв”Җ path в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
read_only = " о©ө"
style = "bold cyan_bright dimmed"
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "~ "
format = "[$read_only]($read_only_style)[у°үӢ $path]($style) "

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"GitHub" = " у°ҠӨ "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "

# в”Җв”Җ git (compact glyphs) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "у°ҳ¬ "
format = "[$symbol$branch(:$remote_branch)](bold magenta_bright dimmed) "
truncation_length = 20
truncation_symbol = "вҖҰ"

[git_state]
format = '[\($state( $progress_current/$progress_total)\)](bold red_bright) '
cherry_pick = "[у°Ҹ« cherry](bold red_bright)"

[git_status]
style = "bold magenta_bright dimmed"
ahead = " у°һҷ "
behind = " у°һҖ "
conflicted = " у°һҮ "
deleted = " у°Ҷҙ "
diverged = " у°“’ "
modified = " у°Ҹ« "
renamed = " у°Ҹ  "
staged = " у°„¬ "
stashed = " у°ҸҢ "
untracked = " у°Ӣ— "

[git_commit]
disabled = true

# в”Җв”Җ python / venv в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[python]
symbol = "оҲө "
pyenv_version_name = true
detect_extensions = ["py", "ipynb"]
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", "tox.ini", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]
# Single-quoted: Starship needs `\(` for literal parens around `$virtualenv`; in TOML `"..."` that `\` breaks parsing.
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )](bold green_bright) '

# в”Җв”Җ timing & privilege hints в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 500
show_milliseconds = false
format = "[пү“ $duration](bold yellow_bright) "

[sudo]
disabled = false
format = "[п‘„](bold red_bright) "

[status]
disabled = true

[jobs]
disabled = false
symbol = "у°ңә "
format = "[$symbol$number](bold yellow_base) "
threshold = 1

[line_break]
disabled = false

# в”Җв”Җ unused modules (explicit off = faster) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[memory_usage]
disabled = true

[time]
disabled = true

[container]
disabled = true

[os]
disabled = true

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
